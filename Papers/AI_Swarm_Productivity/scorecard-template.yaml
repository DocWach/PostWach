# =============================================================================
# Session Productivity Scorecard — TEMPLATE
# =============================================================================
# Instructions:
#   1. Copy this file to data/scorecards/<session-id>.yaml
#   2. Fill all "required" fields. Leave "optional" fields blank if unknown.
#   3. Do NOT fill the "derived" section — computed by analysis script.
#   4. Commit to the hive's repo or store in PostWach/Papers/AI_Swarm_Productivity/data/scorecards/
# =============================================================================

schema_version: "1.0"

# --- SESSION METADATA (required) ---
session:
  id:                    # YYYY-MM-DD-<hive>-<seq>
  date:                  # YYYY-MM-DD
  hive:                  # PostWach | GI-JOE | SysMLv2 | MACQ | COSYSMO | SEAD | PLM | AlphaEmpress
  researcher:            # Your name
  start_time:            # HH:MM
  end_time:              # HH:MM
  task_summary:          # 1-2 sentences: what did this session aim to do?

# --- D1: OUTPUT VOLUME (required) ---
output:
  artifacts:
    - type:              # paper_section | ontology | code | analysis | spec | test | config | review | other
      name:              # Short description
      action:            # created | modified | reviewed
      lines:             # Approximate lines written/changed
      files:             # Number of files
  total_files_created:
  total_files_modified:
  total_lines_written:
  pages_produced:        # Prose: ~250 words/page or ~40 lines/page

# --- D2: AI EFFICIENCY (required: agents, topology, model; rest optional) ---
ai_efficiency:
  agents_spawned:
  swarm_topology:        # hierarchical | mesh | star | hybrid | none
  model_primary:         # e.g., claude-opus-4-20250514
  tokens_input:          # optional
  tokens_output:         # optional
  total_cost_usd:        # optional
  tool_calls:            # optional
  context_compressions:  # optional

# --- D3: QUALITY GATES (required where applicable) ---
quality:
  gates_run:
    - gate:              # Gate name
      result:            # pass | partial | fail | skipped
      details:           # Optional detail
  tests_passed:
  tests_failed:
  reviewer_comments_addressed:
  first_pass_quality_pct:

# --- D4: PROCESS HEALTH (required) ---
process:
  agent_failures:
  retries:
  rework_files:          # Files edited 3+ times
  blocked_minutes:
  blockers:              # 1-2 sentences or "none"
  perception_note:       # Subjective: did AI feel faster or slower than manual?

# --- DERIVED (do not fill — computed by script) ---
