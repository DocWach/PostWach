# =============================================================================
# Session Productivity Scorecard — TEMPLATE
# =============================================================================
# Instructions:
#   1. Copy this file to data/scorecards/<session-id>.yaml
#   2. Fill all "required" fields. Leave "optional" fields blank if unknown.
#   3. Do NOT fill the "derived" section — computed by analysis script.
#   4. Commit to the hive's repo or store in PostWach/Papers/AI_Swarm_Productivity/data/scorecards/
# =============================================================================

schema_version: "1.3"   # 1.3 (2026-07-17): D2b reframed Skills->CAPABILITY UTILIZATION (full harness surface: skills/agents/workflows/swarms/MCP-plugins/memory), machine-sourced by a capability-capture daemon (spec: capability_capture_spec_2026-07-17.md); added D2 coordination_style; single-source-of-truth (D2b never restates authoritative D2 counts); NOT_CAPTURED is a valid honest value; ambient config demoted to record-once. 1.2 (2026-07-16): D2 token/cost REQUIRED + structured. 1.1 (2026-07-10): added D2b skills block.

# --- SESSION METADATA (required) ---
session:
  id:                    # YYYY-MM-DD-<hive>-<seq>
  date:                  # YYYY-MM-DD
  hive:                  # PostWach | GI-JOE | SysMLv2 | MACQ | COSYSMO | SEAD | PLM | AlphaEmpress
  researcher:            # Your name
  start_time:            # HH:MM
  end_time:              # HH:MM
  task_summary:          # 1-2 sentences: what did this session aim to do?

# --- D1: OUTPUT VOLUME (required) ---
output:
  artifacts:
    - type:              # paper_section | ontology | code | analysis | spec | test | config | review | other
      name:              # Short description
      action:            # created | modified | reviewed
      lines:             # Approximate lines written/changed
      files:             # Number of files
  total_files_created:
  total_files_modified:
  total_lines_written:
  pages_produced:        # Prose: ~250 words/page or ~40 lines/page

# --- D2: AI EFFICIENCY (required: agents, topology, model, tokens_output, cost block) ---
# COST CAPTURE IS NOW REQUIRED (v1.2). subagent_tokens_output is the dominant cost driver; record it.
# Dollars: prefer the MEASURED figure from the CLI `/cost` (mark measured:true); else a derived estimate
# with the method. Note the billing_regime -- most Fable-line work has been subscription/toll-free, so
# actual marginal dollars ~0; a per-token notional estimate is still useful for projection.
ai_efficiency:
  agents_spawned:        # AUTHORITATIVE agent count (analyze_scorecards.py derives agent_utilization from this + process.agent_failures). D2b must NOT restate it.
  swarm_topology:        # hierarchical | mesh | star | hybrid | none  (SHAPE of a swarm, when one initialized)
  coordination_style:    # single-agent | agent-fanout | workflow | swarm | hybrid | unknown  (WHAT orchestrated the session; daemon-derived from which tool fired; 'unknown' ONLY when no capture, never a stand-in for 'none')
  model_primary:         # e.g., claude-opus-4-8[1m]
  tokens_input:          # optional (often not surfaced)
  tokens_output:         # REQUIRED — sum of subagent output tokens (from task-notification usage blocks)
  tokens_by_workflow:    # REQUIRED when workflows were used — list: [{name: <wf>, tokens: <n>}, ...]
  cost:                  # REQUIRED
    total_cost_usd:      #   measured $ from `/cost` if available
    measured:            #   true | false (false => estimate)
    cost_estimate_usd:   #   derived $ if not measured (state method in cost_method)
    cost_method:         #   e.g., "blended API rate ~40/40/20 Opus/Sonnet/Fable on output tokens"
    billing_regime:      #   subscription | toll-free-Fable | paid-Fable-toll | Codex-external | mixed
  cumulative_ledger:     # pointer: Papers/AI_Swarm_Productivity/data/research_token_ledger.md (running total)
  tool_calls:            # AUTHORITATIVE total tool-use count (all Read/Edit/Bash/Grep/Skill/Task/MCP...). Daemon-filled going forward; D2b breakdowns are subsets, never additive. Was 'optional'; now the single source for tool volume.
  context_compressions:  # optional

# --- D2b: CAPABILITY UTILIZATION (required) — full harness surface as candidate covariates ---
# Purpose: record WHICH harness capabilities were ENGAGED this session (skills, subagents, workflows,
# swarms, MCP/plugins, memory) + how much, as covariates for the productivity analysis. R020 skills-gap
# (2026-07-10) is the subordinate G2 hypothesis: relevant-skill non-use may track lower first_pass_quality.
#
# RULES (from the 2026-07-17 RBW + GQM formulation; see capability_capture_spec_2026-07-17.md):
#   * PLACEMENT = AGENCY: INVOKED = the agent chose to engage it this session; AMBIENT = standing config it
#     did not choose. Frequency/variance is NOT a placement test.
#   * DE-DUP: record each capability at EXACTLY ONE level, classified by the harness TOOL that fired
#     (Skill->skill, Task->subagent, Workflow->workflow, mcp__*__swarm_init->swarm, other mcp__*->plugin).
#     A slash command that IS a skill is recorded once, as a skill.
#   * SINGLE SOURCE OF TRUTH: never restate an authoritative D2 count here (agents_spawned, tool_calls,
#     swarm_topology). D2b fields are PRESENCE/IDENTITY views + subsets only.
#   * CHANNEL: [auto] = daemon-fillable from the transcript (going forward); [human] = irreducibly subjective.
#     Until the capability-capture daemon lands, fill [auto] fields BY HAND from the transcript only if cheaply
#     known; otherwise write `not_captured` — NEVER guess. `not_captured` is a valid honest value everywhere.
capability_utilization:
  # -- INVOKED (per-session engagement; presence/identity, mostly daemon-sourced) --
  skills_first_check:      # [human] yes | partial | no — did the session check "is the right skill available?" BEFORE executing?
  skills_used:             # [auto/human] skills actually invoked (Skill tool); "none" | not_captured
    - name:
      how:                 # 1 line: what it was used for
  relevant_but_unused:     # [human] skills available AND applicable but NOT invoked (R020 gap); QUALITATIVE flag, cap ~3 the agent actually considered; "none". Do NOT treat as a count.
    - name:
      why_not:             # 1 line
  skills_modified_created: # [human/auto] skills modified or created (R020 MODIFY/CREATE); "none"
  subagent_types:          # [auto] which subagent TYPES engaged + count, e.g. {two-lens-critic: 1, red: 4}; "none" | not_captured. (Total count lives in D2 agents_spawned — do NOT restate.)
  orchestration_runs:      # [auto] each formal orchestration this session; "none" | not_captured
    - name:                #   short label
      tool:                #   workflow | swarm | unknown  (unknown ONLY if the tool truly cannot be determined)
      pattern:             #   e.g. parallel-red(barrier)->white->synthesis
      agents:              #   count in this run
  slash_commands_used:     # [auto] NON-skill slash commands only (skills go under skills_used); "none" | not_captured
  plugins_engaged:         # [auto] which MCP servers/plugins were CALLED this session (identity), e.g. [claude-flow, paperbanana]; "none" | not_captured
  mcp_tool_call_count:     # [auto] count of mcp__* calls (a SUBSET of D2 tool_calls, not additive); not_captured
  tools_notable:           # [auto/human] specialized tools worth noting; "none"
    - name:
      how:
  memory_engaged:          # [auto] memory store/recall used this session? yes | no | not_captured
  stores_written:          # [auto] count of memory writes this session (INVOKED — a per-session choice); integer | not_captured
  utilization_note:        # [human] subjective: did capability (non-)use appear to affect this session's performance?
  # -- AMBIENT (standing config; record-ONCE / annotate-if-changed; NOT a per-session explanatory variable) --
  ambient:
    config_version:        # stamp of the hook/plugin config in force (so drift is detectable); omit if unchanged from last card
    plugins_active:        # [config] MCP servers registered/available (claude-flow, paperbanana); record once, note only on change
    hooks_active:          # [config/hooklog] hooks registered (auto-memory, cost-capture, statusline, intelligence); firing status is daemon/log-sourced, never human-attested
    note:                  # cost-figure provenance lives in D2 cost.measured + cost_method + the ledger, NOT here

# --- D3: QUALITY GATES (required where applicable) ---
quality:
  gates_run:
    - gate:              # Gate name
      result:            # pass | partial | fail | skipped
      details:           # Optional detail
  tests_passed:
  tests_failed:
  reviewer_comments_addressed:
  first_pass_quality_pct:

# --- D4: PROCESS HEALTH (required) ---
process:
  agent_failures:
  retries:
  rework_files:          # Files edited 3+ times
  blocked_minutes:
  blockers:              # 1-2 sentences or "none"
  perception_note:       # Subjective: did AI feel faster or slower than manual?

