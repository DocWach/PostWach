# --- D3: QUALITY GATES (required where applicable) ---
quality:
  gates_run:
    - gate: Sponsor-feedback signal completeness check
      result: pass
      details: |
        Decomposed sponsor feedback paragraph into 12 numbered signals.
        Tracked signal status (agree / agree-w-mod / debate / land / skip)
        across three review rounds. Two signals (R3 systems-theoretic formalism;
        R5 lifecycle reach earlier than ¶6) explicitly skipped with reasoning;
        the rest landed.
    - gate: MOCRA -> MOACRA rename consistency check
      result: pass
      details: |
        Caught two stale "MOCRA" references in v2 round 1 (¶3 "MOCRA assessment",
        ¶5 Task 1 "MOCRA ontology"). User patched both in round-2 rewrite.
        Final v3 doc is MOACRA throughout body.
    - gate: Subject-verb agreement check
      result: pass
      details: |
        Caught "Fitness and survivability of systems for the mission is now
        driven by the cyber domain" in v2 round 1. User fixed in round 2
        (also tightened by dropping "of systems for the mission").
    - gate: Page-fit budget check
      result: pass
      details: |
        Tracked +/-word counts across recommended additions and trims to
        ensure the doc would not spill to a second page. R5 was the largest
        addition (+12 words) and stayed on page; R2 (+15) and R4 (+7) compounded
        without spilling.
    - gate: [D3] no-external-method-names compliance
      result: pass
      details: |
        Conceded R3 (systems-theoretic formalism) on the [D3] precedent that
        retired OQuaRE and SHACL in the 2026-05-04 session. v3 doc carries
        no named methodologies in body text; "competency-question catalog"
        in Task 1 reads as a deliverable name, not a method name.
    - gate: TDAC sponsor identity correction
      result: pass
      details: |
        User-provided "tdac transformation decision analysis center" in
        feedback prompt. Caught divergence from 2026-05-04 archive's
        "TRMC-adjacent / Transformation and Data Analysis Training Center";
        flagged for memory correction; updated `project_mocra_proposal.md`
        and recorded as D3 in the session archive.
  tests_passed: 6
  tests_failed: 0
  reviewer_comments_addressed: 12   # 12 sponsor signals decomposed and tracked
  first_pass_quality_pct: 90   # decoding was clean; only the 4 open questions
                                # required user adjudication before drafting

# --- D4: PROCESS HEALTH (required) ---
process:
  agent_failures: 0
  retries: 1   # PowerShell ZipFile OpenRead failed first time without
               # `Add-Type -AssemblyName System.IO.Compression.FileSystem`;
               # second run with the assembly load succeeded
  rework_files: 0   # User owned the docx rewrites; Claude did not iterate
                    # on the same file multiple times this session
  blocked_minutes: 3   # OneDrive cloud-only state on v2.docx blocked
                       # python-docx; pivoted to PowerShell ZIP API. ~3 min
                       # of recovery, no impact on user-visible delivery.
  blockers: |
    python-docx threw PackageNotFoundError on
    `MissionFitness_UofA_2026-05-05_v2.docx` even after a local Copy-Item,
    because the OneDrive sync state did not present a fully readable zip
    container to the Python ZipFile reader. Recovered by using the
    .NET `System.IO.Compression.ZipFile` class via PowerShell, which read
    the Copy-Item'd %TEMP% copy successfully. Pattern recorded in the
    session archive's "Next session entry hints."
  perception_note: |
    Round-2 read of the user's v2 was the highest-leverage moment of the
    session: the user had folded six of my proposed signals into a single
    dense ¶1 rewrite that was tighter than what I had been about to draft.
    The right move was to acknowledge that explicitly, drop my own draft
    plan, and pivot to ranked-critique mode against the user's text. The
    discipline of presenting per-signal disposition (agree / agree-w-mod /
    debate) with explicit page-budget accounting kept the three rounds
    converging instead of diverging. R3 was conceded on a [D3] precedent
    rather than re-litigated, which preserved the user's editorial spine.
    Net: v3 sent in ~one wall-clock hour with no Claude-side docx edits;
    the user did all the writing and Claude operated as ranked critic.
