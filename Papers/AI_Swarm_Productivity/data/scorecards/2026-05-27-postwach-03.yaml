# --- D4: PROCESS HEALTH (required) ---
process:
  agent_failures: 1     # Codex headless run failed on prompt arg-parse
  retries: 1            # fixed by piping the prompt via stdin with '-'
  rework_files: 1       # v4 speaker script (write, em-dash fix, demo-arc correction, time-strategy/open-items)
  blocked_minutes: 0
  blockers: >
    Codex `exec` rejected the multiline prompt as positional args; resolved by
    piping it via stdin with '-'. Otherwise none; both swarm CLIs ran in the
    background without blocking the main thread.
  perception_note: >
    Faster for multi-document production and, notably, for genuine multi-model
    Q&A diversity (Codex and Gemini each surfaced angles Claude alone missed,
    e.g. negative objectives and translation-semantics reproducibility). The real
    cost this session was scripting image-only slides without looking at them
    first; rendering the deck to PNG via PowerPoint COM fixed it. Lesson: render
    the deck before scripting to visuals.
