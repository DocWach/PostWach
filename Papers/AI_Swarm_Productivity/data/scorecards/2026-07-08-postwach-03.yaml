# --- D2: AI EFFICIENCY (required: agents, topology, model; rest optional) ---
ai_efficiency:
  agents_spawned: 24    # 3 Fable derivation runs; 2 Opus consolidation/verify; 1 DEVS-book review; tri-model sweeps + RBW (~3 legs each) + retries
  swarm_topology: hybrid   # background agents + Workflows + red/blue/white tri-model across Claude/Codex/Gemini
  model_primary: claude-opus-4-8[1m]   # main loop; derivation on claude-fable-5[1m]; adversarial legs also gpt-5.5 (Codex) + Gemini
  tokens_input:
  tokens_output: 620000   # approximate; Fable runs alone ~175k + ~121k + ~165k output
  total_cost_usd:
  tool_calls:
  context_compressions: 0
  external_tools: "Fable 5 (derivation); Codex gpt-5.5 + Gemini (tri-model legs); Zeigler TMS2018 PDF review; pandoc/xelatex (PDFs); gh"

# --- D3: QUALITY GATES (required where applicable) ---
quality:
  gates_run:
    - gate: Step 1 tri-model adversarial sweep (Claude/Codex/Gemini)
      result: pass
      details: 7/8 claims sound; one overstated proof caught and repaired; core architecture held; two source facts resolved from documents
    - gate: Step 2 tri-model adversarial sweep
      result: partial
      details: architecture held (level-typed schema, FO-1 fence, Step-1 consistency); interface complex needs identity-based re-derivation (completion pass drafted)
    - gate: Interface-representation RBW debate (red/blue/white)
      result: pass
      details: default R2 decided; carry-all delivered as a facet lemma; R5 deferred; Red's R4-core refuted on the merits
    - gate: Tri-model prompt reviews (Step 2, example build) before spending Fable
      result: pass
      details: caught railroading and a taxonomy category error pre-run
  tests_passed:
  tests_failed:
  reviewer_comments_addressed: 45   # approximate; consolidated fix items across four sweeps/debates
  first_pass_quality_pct: 70        # Step 1 essentially first-pass; Step 2 needs one targeted completion pass

# --- D4: PROCESS HEALTH (required) ---
process:
  agent_failures: 5   # Gemini transient 503s (x2, retried ok); Codex arg-parse (fixed via stdin); example-build launch (x2 CLI syntax, fixed)
  retries: 5
  rework_files: 4   # Step1 amended doc; Step2 prompt (v1->v2); example prompt (v1->v2); assurance reports
  blocked_minutes: 15
  blockers: >
    Transient Google 503s on the Gemini leg (retried successfully); minor CLI syntax on Codex/Gemini
    (stdin piping + --skip-trust). No conceptual blockers; the Fable base was untouched by every downstream step.
  perception_note: >
    Dramatically faster than manual, and higher-assurance. Two theory steps DERIVED and independently
    adversarially VERIFIED, plus a design-space decision, in one session. Two of Step 2's four hypotheses
    were refuted with repairs (direct evidence the hardened prompt tests rather than rubber-stamps), and
    the three verification models broke largely DISJOINT things (direct evidence the tri-model sweep is
    genuinely independent, not an echo). The sweeps caught load-bearing errors a single reviewer would miss
    (an inadmissible pairing arity, a scope bug, an undefined projection). Cost concentrated in the scarce
    Fable window; verification/mechanical stayed on Opus + Codex/Gemini.
