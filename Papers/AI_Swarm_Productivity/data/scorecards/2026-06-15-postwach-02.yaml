# --- D3: QUALITY GATES ---
quality:
  gates_run:
    - gate: Visual render verification (PowerPoint COM -> PNG, inspect every slide)
      result: pass
      details: Caught and fixed title/venue overlap, headings under logo, chart right-edge overflow.
    - gate: Source / citation verification
      result: pass
      details: TRAK definition confirmed from practitioner guide v16; corrected a subagent's over-specified Q1-Q3 wording; AI-history white-paper citation verified verbatim.
    - gate: Public-safe sensitivity review
      result: pass
      details: No NNSA / budget / CUI / pre-decisional content on slides; R016 integration-status tags applied; no em dashes.
  tests_passed:
  tests_failed:
  reviewer_comments_addressed: 3   # deck designed to answer the 3 IS reviewers' "no validation/examples" critique via WRT-2516 progress + TRAK results
  first_pass_quality_pct: 80

# --- D4: PROCESS HEALTH ---
process:
  agent_failures: 0   # 1 subagent over-specification (TRAK Q-wording) caught and corrected before it reached a slide
  retries: 4          # chart annotation (2x), render-driven layout fixes
  rework_files: 2     # the deck (multiple rebuilds), the TRAK chart (3 iterations)
  blocked_minutes: 15
  blockers: >
    OneDrive online-only files threw PackageNotFoundError in Windows-native python; worked around by
    copying to %TEMP% before reading. A stale on-disk file (principal's image edit to slide 3 not yet
    synced) meant the final slide-3 note was handed over as text rather than written, to avoid a stale build.
  perception_note: >
    AI markedly faster than manual for template matching, figure generation, multi-source synthesis,
    and iterative deck construction. Main friction was OneDrive sync and the render-inspect-fix loop,
    both of which still netted well ahead of manual slide building.
