  blockers: >
    Hash job v1 stalled due to Windows machine sleep cycles. Diagnosed correctly
    (machine sleep, not script bug). Patched script v2 to call
    SetThreadExecutionState(ES_SYSTEM_REQUIRED) via ctypes and added
    ProcessPoolExecutor parallel workers. v2 completed cleanly in 213 min vs.
    estimated 7+ hours under stalled v1 pace.
  perception_note: >
    Disk-I/O bound work is genuinely faster with parallel Python workers + sleep
    prevention than with naive single-threaded scripts; about 10x throughput
    improvement on the recovery. Correctly declined a claude-flow agent swarm
    proposal for the same work (LLM agents add no value to SHA-256 + file copy).
    Hash-aware dedup engine prevented ~1.9 GB of redundant publication copies
    during the VT->UA merge, paying off the upfront inventory investment cleanly.
