process:
  agent_failures: 1  # RED team agent timed out on internal polling; delivered late after WHITE had already issued recommendation
  retries: 3  # v15 rebuilt twice (post-acronyms, post-landscape-image), v16 rebuilt twice (after Conway removal, after data-bug fix)
