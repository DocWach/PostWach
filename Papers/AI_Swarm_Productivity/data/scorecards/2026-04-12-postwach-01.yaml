# --- D4: PROCESS HEALTH ---
process:
  agent_failures: 14  # Sub-agents returning plans instead of executing due to plan-mode inheritance bug
  retries: 2  # PDF regenerated (v7 -> v8); generator run twice to debug sheet count
  rework_files: 3  # trak_workbench.py edited across many phases; section_7_8.md edited for O7 I4 and other fixes; excel_bridge round-trip polish
  blocked_minutes: 0  # No blockers halted progress; agent plan-mode was worked around by main session execution
  blockers: |
    None halted the session. Sub-agent plan-mode inheritance was a persistent friction:
    14 of 24 spawned agents returned plans instead of executing, even with bypassPermissions
    mode and explicit "execute directly" instructions. Workaround was to execute plans in
    the main session rather than re-spawn. Productivity-relevant finding flagged for
    inter-hive policy session (Topic 1).
  perception_note: |
    Very high-productivity session covering the full TRAK tool build from scratch,
    including a surprise v8 data bug fix in the guide itself. Three-hive governance
    chain (PostWach -> GI-JOE -> SEAD) completed end to end in a single day.

    AI felt much faster than manual for bulk work: Streamlit tab scaffolding (400+ LOC
    each) was authored end-to-end by the main session in minutes per tab, as was the
    openpyxl workbook generator (520 LOC). Test generation kept pace. Tri-team review
    (Red + Blue + White) in parallel produced high-signal findings, especially the
    data integrity issue (cell count synthesis vs matrix detail divergence) that
    caught a propagated arithmetic error from yesterday's session.

    Sub-agent unreliability was the main productivity drag. 14 of 24 agents returned
    plans rather than executing. Workaround consumed additional main-session tokens;
    if sub-agents had executed as directed, estimated 2-3 hours of wall-clock time
    and proportional tokens would have been saved. Topic 1 in the inter-hive policy
    notes captures this.

    Governance innovation worked: the PostWach -> GI-JOE ontology specification
    handoff plus intake amendments plus integration-over-ratification closure
    pattern produced a clean trak-ont v0.1.0 with zero formal paperwork rollbacks.
    Same pattern for SEAD handoff with a sensible healthcheck amendment accepted.

    Two-supported-entry-points design (Streamlit + standalone Excel) was the right
    call for NNSA audience. Both tools implement the same methodology with clear
    selection criteria; practitioners can move between them via excel_bridge.py.
