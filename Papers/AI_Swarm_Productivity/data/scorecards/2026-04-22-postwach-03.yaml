# --- D2: AI EFFICIENCY (required: agents, topology, model; rest optional) ---
ai_efficiency:
  agents_spawned: 4              # general-purpose, one per reviewer_comments PDF, background parallel
  swarm_topology: none           # 4 independent agents, no inter-agent coordination; single-burst parallel spawn
  model_primary: claude-opus-4-7
  tokens_input:                  # orchestrator context not measured; per-agent totals below
  tokens_output:
  total_cost_usd:
  tool_calls:
  context_compressions:
