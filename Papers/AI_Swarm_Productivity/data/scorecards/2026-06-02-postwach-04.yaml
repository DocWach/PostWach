    Mid-session figure-choice reversal (Mermaid → PaperBanana for Fig 1) cost
    one iteration. Cross-paper fix attempts on AICB v0.7 and STOIC v0.6 were the
    main process loss: ~30+ minutes spent producing two broken PDFs that the
    principal explicitly withdrew. Otherwise the session ran without hard blockers.
  perception_note: |
    Mixed session. SwarmEng v0.2 PDF is a real verified-references third SERC
    abstract that did not exist at session start, anchored cleanly on GI-JOE,
    differentiated from AICB and STOIC, with a journal-paper trajectory captured
    in §5. That is the win. The R019 proposal is the second win because it
    converts a recurring failure mode into a structural fix that composes
    existing demonstrated capabilities (tri-model review pipeline 2026-05-21,
    TRAK Bayesian evidence, GI-JOE ontology-gate two-tier pattern) rather than
    inventing new ones.

    Two losses. First, REF 1 McDermott was drafted from internal memory with
    three load-bearing errors and caught only by post-draft triple-check; the
    existing behavioral rule was clearly inadequate, which is why the R019
    proposal exists. Second, the AICB v0.7 and STOIC v0.6 cross-fix attempts
    were a scope misread: "Update the other two abstract references as well,
    if needed" authorized a text fix, not a re-render of build chains I did not
    own. Both losses are flagged in the archive §5 with the lesson stated.

    The principal's call to pause and pick this up tomorrow in a single
    dedicated session is the right shape: v0.3 needs an applications-spectrum
    rewrite that needs principal input on three items (STOIC-as-application
    scope, SDL context, IGNITE specifics) that cannot be substituted by
    confident-sounding model guessing without repeating the same failure mode
    as REF 1.

