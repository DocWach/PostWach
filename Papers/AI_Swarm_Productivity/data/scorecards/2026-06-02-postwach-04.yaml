      result: fail
      details: REF 1 McDermott was drafted from internal memory in v0.1, with three load-bearing fields wrong (title, author position, page range). Caught by post-draft triple-check, not at draft time. Same failure mode as 2026-05-27 STIDS incident. Logged in archive §5 Failure 1 and motivates R019.
    - gate: discuss-before-execute rule
      result: partial
      details: applied for figure choice (Mermaid A vs B), structure (i vs ii), drafting mode (bullet vs full draft), title commitment. NOT applied to AICB/STOIC cross-fix re-render scope. Logged in archive §5 Failure 2.
