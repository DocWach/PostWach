# --- D4: PROCESS HEALTH (required) ---
process:
  agent_failures: 0                     # literature-reviewer subagent completed cleanly (5 PASS / 6 EDIT / 1 PLACEHOLDER pass-through)
  retries: 1                            # PaperBanana plot path rejected mid-call by principal; replaced with Mermaid Fig 2; later removed in v0.3 scope
