      result: pass
      details: v0.1 and v0.2 prose audited internally; em dashes absent, AI-voice openers and balanced two-sided constructions avoided, BFO/CCO/OQuaRE/OntoClean/SHACL/SPARQL/TBox/ABox/CQ/OWL 2 RL/LLM all spelled out at first use with short form in parens.
