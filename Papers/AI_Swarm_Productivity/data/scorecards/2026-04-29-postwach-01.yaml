# --- D4: PROCESS HEALTH (required) ---
process:
  agent_failures: 0
  retries: 1
  rework_files: 1
  blocked_minutes: 2
  blockers: |
    One openpyxl 3.1.5 API mismatch on first spreadsheet build:
    DefinedName key must equal the 'name' attribute. Fixed via helper refactor
    to set both consistently. Re-build succeeded immediately after.
  perception_note: |
    AI was substantially faster than manual would have been. The discovery
    pass (locating Lego across hives, reading 6+ files in parallel) is the
    biggest leverage point, on the order of 10x. Spreadsheet authoring via
    openpyxl was modestly faster than manual Excel construction (perhaps
    1.5-2x) but produces a regenerable, version-controllable artifact, which
    is the real value. PDF rendering in-process beat any 'export from Word'
    flow. The debate framing (inductive vs deductive) was where AI added
    judgment value beyond speed; the user explicitly asked for a debate and
    the response surfaced the dependency on student SysML v2 fluency level
    that the user then resolved with one of the five decision answers.
