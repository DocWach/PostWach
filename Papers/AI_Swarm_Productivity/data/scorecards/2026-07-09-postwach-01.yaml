        All three yes-with-changes, strongly convergent: forced the JOINT semi-Markov carrier,
        W1 metric + Dobrushin contractivity, strong-lumpability three-object split; predicted the
        transition-timing coupling before any Fable spend. Folded to v2.
    - gate: Fable Step 4 derivation (attempt-and-test against H-S1..H-S5)
      result: pass
      details: All five hypotheses confirmed; additive point predictor refuted; Theorem UB derived with the cross-term. No RED-FLAG vs Steps 1-3.
    - gate: Tri-model adversarial sweep of the Step 4 candidate
      result: fail
      details: >
        5/9 claims unanimously SOUND, but Codex constructed an EXACT counterexample breaking
        Theorem UB as stated (correlated joint kernel, all marginal residuals zero, realized W1=1
        vs bound 0). Hand-verified real. Three further witness/statement-level defects. The false
        flagship theorem was caught PRE-acceptance - the sweep's decisive validation.
    - gate: Fable completion pass (Theorem UB' + 3 repairs)
      result: pass
      details: UB' restated on the joint residual (split form, derived constants); old form recovered as Corollary UB-F (false without factorization); JX negative control tight; K_p projections, GX, DR' repaired.
    - gate: Codex domain-critic re-verification (the leg that authored the break signs off)
      result: pass
      details: All 6 items DISCHARGED, hand-recomputed in exact rationals; adversarial hunt for a NEW counterexample to UB' found none; 2 wording notes applied same day. Step 4 CLOSED.
