    WebFetch batches verified 22 references in ~30 minutes wall-clock). LaTeX
    debugging consumed the bulk of toolchain time but root-cause + minimal-repro
    + portable workaround pattern was established and documented in the .tex
    header, so the patterns are reusable on the next CEUR submission.
