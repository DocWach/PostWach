# --- D3: QUALITY GATES (required where applicable) ---
quality:
  gates_run:
    - gate: ruflo --version
      result: pass
      details: v3.7.0-alpha.14 confirmed; MCP system_health 100/100 on 5 monitored components
    - gate: in-text ↔ bibliography mapping
      result: pass
      details: 10 entries, 10 cited, no orphans either direction; consistent style
    - gate: external reference verification (triple-check)
      result: pass
      details: 7 reference fixes applied (Kim subtitle, Wymore full title + Tricotyledon spelling, Zeigler "&" form, Cohen URL ruflo not claude-flow, INSIGHT format strip, refs 8/9 "(accepted)" drop, ruflo title); 2 style fixes (& inside brackets, figure captions parens→brackets)
    - gate: em-dash grep
      result: pass
      details: no em dashes in source
    - gate: page-count budget (3pp body + 1pp refs)
      result: pass
      details: 4 total pages held after 5.7 close trim; one 5-page overflow caught and corrected
    - gate: figure pipeline
      result: pass
      details: 3 figures placed inline, all paths resolve; Figure 2 swapped late-session (Houston → INSIGHT Fig 4 timeline)
    - gate: submission split
      result: pass
      details: Abstract_submitted.pdf (3pp) + References_Bios_submitted.pdf (1pp) delivered
  tests_passed: 0
  tests_failed: 0
  reviewer_comments_addressed: 0
  first_pass_quality_pct:   # not measurable here (drafting + iterative copyedit, not reviewer cycle)

# --- D4: PROCESS HEALTH (required) ---
process:
  agent_failures: 0
  retries: 1            # Section 5 close trim after 5-page overflow on first re-render
  rework_files: 1       # v0.5.md edited ~20 times across the session (single-paragraph and sentence-level)
  blocked_minutes: 0
  blockers: |
    One Windows file-lock blip: re-render blocked because the PDF was open
    in the user's viewer. Resolved by switching to render-to-temp + atomic
    mv-swap pattern (kept for all subsequent renders). No real time loss.
  perception_note: |
    Section-by-section bullet expansion (decided at debate stage) prevented
    the misalignment incident from postwach-04. No restructure thrash, no
    prose drafted before structure locked. The user-driven 12-item edit pass
    after first render was the heaviest single turn; batching all 12 with
    debate-and-update reasoning kept it to one render cycle. NATO panel
    title hallucination correctly avoided: web sources insufficient, asked
    the user for verbatim string (per no-hallucinated-identifiers rule),
    applied verbatim once received. Triple-check rule from postwach-05 paid
    out: 7 ref fixes caught before submission, including Wymore terminology
    (Tricotyledon vs Tricotyledonous) that the user's own prior draft had wrong.

