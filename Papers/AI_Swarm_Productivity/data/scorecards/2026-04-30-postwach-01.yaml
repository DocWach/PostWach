      result: pass
      details: |
        9/9 YAMLs landed (canonical artifacts intact). 3/9 MDs landed at Tier 1 close
        before quota truncation; 6/6 missing MDs regenerated by post-pass MD-regen
        agent. Final state: 9 YAML + 9 MD on disk.
    - gate: Tier 2 swarm completion (4 reviewers)
      result: pass
      details: All 4 YAMLs and MDs landed.
    - gate: Tier 3 swarm completion (synthesis + strategy)
      result: pass
      details: |
        Both YAMLs and MDs landed. Both later marked superseded after author-frame
        correction; verdict "reject in current form" retracted in favor of "focused
        revision."
    - gate: Wymore-lens reviewer
      result: pass
      details: |
        Knowledge caveat declared (no Wymore book PDF in session). [VERIFY-BOOK]
        tags applied to items needing book verification. Spine of corrective
        re-synthesis.
    - gate: Author-frame correction
      result: pass
      details: |
        math-research-connector D_h push suppressed; publication-strategist Wiley SE
        redirect suppressed; literature-reviewer empty-bibliography finding corrected
        after repo fetch.
    - gate: Repo fetch via gh CLI
      result: pass
