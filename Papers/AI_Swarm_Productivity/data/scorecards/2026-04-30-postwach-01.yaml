        Initial curl failed (auth-required URLs from gh api response). Switched to
        gh api with Accept header for raw content; 3 files fetched successfully.
    - gate: Live literature search (3 tracks)
      result: pass
      details: |
        Track 1: 15 Wymore-authored items verified, including the highest-leverage
