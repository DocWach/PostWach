# --- D4: PROCESS HEALTH (required) ---
process:
  agent_failures: 0
  retries: 4
  rework_files: 3
  blocked_minutes: 10
  blockers: |
    Quota notifications truncated some agent output files mid-write (6 of 9 Tier 1
    MDs, 1 of 3 corrective synthesis files). Mitigation: YAML-first design ensured
    canonical artifacts survived; MDs are companions and were regenerated post-pass.
    Plain curl failed against GitHub raw URLs that came pre-tokenized from gh api;
    switched to `gh api -H "Accept: application/vnd.github.raw"` for clean auth.
    No real block.
  perception_note: |
    Substantial swarm test under realistic conditions. The 15-agent hierarchical-mesh
    design produced complementary critique (math, physics, ML, logic, statistics,
    optimization, literature, portfolio, red-team, peer-review simulation), and the
    later corrective re-synthesis was made cheap by the canonical-YAML-primary
    schema (each Sam-frame correction was applied at synthesis time, not by re-running
    individual reviewers). The biggest lesson: prompts that say "you may use
    WebSearch" are not the same as "you must use WebSearch", and 15 reviewers
    operating from training memory are not a substitute for live literature search.
    The user correctly flagged this and the corrective Track 1-3 search caught real
    training-memory inaccuracies (DeepONet author list, Berkenkamp venue, Wach
    publication years/venues, BALD arXiv-only). Wymore-Bahill 2000 was missing from
    the initial review and is the highest-leverage citation Sam needs to add.
    Total artifact count is large (50+ files), but the canonical-primary schema
    means the user can ignore the long tail and read just two files
    (`reviewer_feedback.md` in source folder + `wymore-frame-synthesis.md` in
    review folder) for the full actionable summary. Author-frame correction
    mid-session was the most consequential branch: the prior Tier 3 had reached
    "reject in current form, redirect to Wiley SE", and that verdict rested on
    Wach-portfolio coherence reasoning that simply did not apply once Sam was
    correctly identified as lead. The corrective pass took less than one quarter
    of the original swarm's effort because the YAMLs from individual reviewers
    were author-frame-agnostic in their findings (math correctness is math
    correctness regardless of who the author is); only the synthesis and strategy
    layers needed reframing.

