# --- D3: QUALITY GATES (required where applicable) ---
quality:
  gates_run:
    - gate: syntax / py_compile
      result: pass
      details: ast.parse + py_compile clean before each run and before commit
    - gate: PII-free check on shareable HTML
      result: pass
      details: grep for sponsor names/EINs on the default dashboard returned 0; named targets isolated to the _internal build (F110)
    - gate: no-PII-in-commit
      result: pass
      details: verified only scripts/ + docs/ staged; all data/ (zips, CSVs, reports, HTML, figures) gitignored before commit/push
    - gate: figure render verification
      result: pass
      details: visually inspected fig1 (market-vs-deal-size) and fig3 (asset-band stacked area) PNGs; fixed mathtext label bug (text.parse_math=False)
    - gate: data spot-check vs live 5500Search UI
      result: skipped
      details: not performed this session; recommended before treating named targets as outreach-ready
  tests_passed:
  tests_failed:
  reviewer_comments_addressed: 5   # principal steers incorporated: data vintage, full datasets/trends, spectrum, recommendations-led, named targets
  first_pass_quality_pct: 80       # self-caught a NameError (medN), a messy table hack, and mathtext labels; fixed before delivery

# --- D4: PROCESS HEALTH (required) ---
process:
  agent_failures: 0
  retries: 3                    # medN NameError re-run, mathtext-label re-run, one cwd/.gitignore false alarm
  rework_files: 1               # report_form5500.py edited 3+ times across the scope expansions
  blocked_minutes: 5            # brief waits on background full-dataset ingests (ran async, non-blocking otherwise)
  blockers: >
    None significant. Data-quality finding: the broker-fee scoring signal (SF_BROKER_FEES_PAID_IND)
    keys off a blank/zero Yes/No flag, so the high-value "no incumbent advisor" filter yields only
    1 plan — deferred as open item (c). Bash-tool cwd persistence caused one false "missing .gitignore".
  perception_note: >
    Markedly faster than manual. Streaming full 9-year datasets (5.96M filings), computing every
    figure reproducibly, generating matplotlib + interactive Plotly outputs, and restructuring on
    each principal steer would have taken days by hand. Main risk is unverified named targets (no
    live-UI spot-check) and the known broker-fee signal limitation.
