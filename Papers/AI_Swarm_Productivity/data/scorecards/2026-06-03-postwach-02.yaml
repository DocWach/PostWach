# --- D4: PROCESS HEALTH (required) ---
process:
  agent_failures: 0                # 3 subagents all returned cleanly
  retries: 4                       # title tiebreak + multi-author + editor field + hyphen normalize — each iteration after a test surfaced an edge case
  rework_files: 3                  # refcheck.py (5 edits: include-pending, tiebreak, multi-author, editor, stub message), refverify.py (5 edits: --list-stale, --refresh, ENRICH verdict, hyphen normalize, table status column), R019 proposal (multiple edits over session)
  blocked_minutes: 0
  blockers: |
    EndNote XML export initially returned only 1 record (export scope was
    'selected references' not 'all'); user re-exported with Select-All and
    full 1562 records came through. Caught by initial assessment; resolved
    next turn. Concurrent agent claim of NameError in refcheck.py was
    incorrect (rename had propagated cleanly); verified by direct read +
    end-to-end test. No real blockers.
  perception_note: |
    Heavy session, high concentration of new infrastructure. R019 went
    from a parked proposal to fully operational (6/6 acceptance criteria)
    in one continuous session, spanning two calendar days. Swarm phase
    (3 parallel background agents) ran cleanly; coder Agent A's Phase 3
    backfill report surfaced the matcher false-positive that the
    follow-up turn addressed. The end-to-end /refverify test on
    @wach2022pairing closed the Phase-3 cycle (PENDING -> approved with
    DOI enrichment) — a real ref through the full MVP pipeline.

    Two findings worth carrying forward: (1) external bib edits during a
    session can silently break matching for in-flight manuscripts (the
    13/16 regression caught us); future sessions should re-run refcheck
    after any approved.bib edit. (2) The pending pool is more useful as
    /reflookup search infrastructure than as a Phase-3 verification
    queue — only 1 of 40 cross-paper citations resolved to a pending
    entry. The remaining ~1561 EndNote entries are historical context,
    not in-flight backfill candidates.

    Smaller wins worth keeping: (a) ENRICH verdict (claimed empty +
    canonical present = enrichment, not contradiction) keeps /refverify
    sane on partial-metadata candidates; (b) unicode hyphen + smart-quote
    normalization in compare avoids false DIFFs from typography; (c) the
    aliases bib field handles single-author software cites cleanly
    (ruvnet) without changing the canonical author form.

