# --- D4: PROCESS HEALTH (required) ---
process:
  agent_failures: 0
  retries: 2                    # DOCX write blocked by Word file lock (resolved via new filename); one latexmk force-rebuild
  rework_files: 1               # main.tex
  blocked_minutes: 5
  blockers: >
    DOCX same-name write blocked by the file being open in Word; resolved with a distinct filename rather than
    force-closing Word (hazard rule). No DOCX renderer available, so table fidelity cannot be visually verified here.
  perception_note: >
    The corrective block was fast and high-yield. The lesson from the postwach-03 misses held: verifying against
