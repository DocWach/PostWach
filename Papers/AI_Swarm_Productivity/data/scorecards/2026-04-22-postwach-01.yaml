  context_compressions:

# --- D3: QUALITY GATES (required where applicable) ---
quality:
  gates_run:
    - gate: CFP compliance (section structure, title length, page limit, research area declaration)
      result: pass
      details: >
        Title 18 chars (<=200); all four required content elements present
        (Objectives, Methodology, Outcomes, Relevance to Practice); research
        area named verbatim; references on separate page after \newpage.
    - gate: R016 compliance (integration-status tagging)
      result: pass
      details: >
        CBTO tagged as work-in-progress in Sections 4 and 6. Original draft
        had three mentions; one removed in review pass to avoid redundancy.
        No research artifact presented as demonstrated capability or
        integrated deliverable.
    - gate: Plain-language commitment (define-at-first-use)
      result: pass
      details: >
        MTBH, SHACL, SPARQL, PROV-O, CBTO, OWL 2 DL all glossed inline at
        first use. "Metrology" and "morphism" glossed in Section 2. No em
        dashes in body prose.
    - gate: Terminology consistency (iso/homo, degradation/divergence)
      result: pass
      details: >
        Background Explore agent confirmed no contradictions with committed
        archive decisions. "Morphism quality" as umbrella; "distance" on
        axes; "Divergent" as quadrant-position label (non-contradicting
        per archive).
    - gate: Red/blue/white team review
      result: partial
      details: >
        Red team identified 10 weaknesses, blue team identified 8 strengths,
        white team confirmed CFP structural compliance. User confirmed 5 of
        7 prioritized fixes; 2 (Red-1 no evidence base, Red-3 gap claim
        rebuttal risk) deferred or accepted.
    - gate: PDF page-count (CFP 4-page cap)
      result: pass
      details: >
        Initial render at 11pt/1in margins = 7 pages. Iterated formatting:
        10pt, 0.75in margins, linestretch 0.95, Figure 1 at 85% width,
        Figure 2 at 55% width. Final render = 4 pages.
  tests_passed: 5
  tests_failed: 0
  reviewer_comments_addressed: 0   # Jeffrey review not yet received
  first_pass_quality_pct: 75       # five review-driven fixes needed post-first-draft

# --- D4: PROCESS HEALTH (required) ---
process:
  agent_failures: 0
  retries: 3                       # PDF render iterations (7pp -> 5pp -> 4pp); Diagram 3 label iterations
  rework_files: 2                  # diagram3_cleaned.mmd (~5 iterations); v0.5.md (multiple section replacements)
  blocked_minutes: 0
  blockers: >
    Minor friction only: MiKTeX "unsupported Windows" warnings (noise, no
    real effect); PDF viewer locked output file during re-render (worked
    around by writing to preview filenames and renaming). One PDF filename
    Unicode issue (hyphen/en-dash) worked around by copying to a
    normalized temp filename.
  perception_note: >
    Discuss-before-executing pattern kept the pace slower than a single-pass
    draft but produced higher first-pass quality and multiple useful pivots
    that would have been expensive to reverse later. Key pivots: (1) Option
    A collapse of Methodology + Architecture sections, driven by user
    observing that the figure IS the method; (2) Section 3 tightening after
    TRAK overlap discussion surfaced the "measurement supplies evidence, not
    the decision" framing; (3) plain-language policy committed early and
    enforced consistently, which made jargon-reduction decisions easy.
    Round-tripping PDF layout parameters was the time-expensive
    integration step; having agreed on figure widths earlier would have
    saved two render iterations. AI-assisted pace felt roughly 3x to 4x
    faster than solo drafting for a comparable quality deliverable.

