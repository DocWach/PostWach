# --- D3: QUALITY GATES ---
quality:
  gates_run:
    - gate: Fable attempt-and-test derivation against stated refutation targets (H-T1..H-T4)
      result: pass
      details: >
        All four hypotheses CONFIRMED with fences. H-T1 timing irreducible (timed-N3b pair,
        ta = 1,1 vs 1,sqrt2, equal on every untimed coordinate incl. g_max; reconstruction refuted).
        H-T2 admissible exact timed collapse = N-congruence + ta block-constant (Lemma G_t both
        directions); NEW finding: (C-ta) is a FILTER, not a closure clause. H-T3 predicate boundary
        = saturation + horizon-margin, with a realized numeric flip (P-t4). H-T4 D_inst^t = absorbed
        K2-side + independent K_3^inst,t (conditional on fixed input A). No RED-FLAG against Steps 1-2.
    - gate: Tri-model blind adversarial sweep (Claude Opus + Codex + Gemini), aimed at the TCX adjudication
      result: pass
      details: >
        6 of 8 claims UNANIMOUSLY SOUND (TN3b irreducibility, Lemma G_t both directions, the (C-ta)
        filter, D_inst^t, anti-double-counting, untimed restriction, all fences). The TCX adjudication
        UNANIMOUSLY endorsed as principled (Gemini strengthened it with a reactive-input divergence
        construction). Two statement-level repairs identified, neither architectural: (1) TTA restated
        as a conservative certification rule, not an iff; (2) the N5'-t witness re-scoped to autonomous
        trace equivalence (TCX is not input-closed; all three legs, three independent routes).
  tests_passed:
  tests_failed:
  reviewer_comments_addressed: 2    # the two statement-level repairs (both applied 2026-07-09 Opus errata); minor list items folded same pass
  first_pass_quality_pct: 80        # architecture held completely and 6/8 claims were unanimous first pass; the two defects were statement-level (TTA wording, N5'-t scope), not structural, and the tri-model sweep caught both

# --- D4: PROCESS HEALTH ---
process:
  agent_failures: 0
  retries: 0
  rework_files: 0                 # no rework this session; the two repairs were deferred to the 2026-07-09 Opus errata pass, not reworked here
  blocked_minutes: 0
  blockers: "none in-session. The session itself was TRUNCATED by an unplanned machine autorestart shortly after the assurance report + morning summary were produced; no work was lost (artifacts had already been written), but the session-end scorecard/archive step was interrupted and completed on 2026-07-09."
  perception_note: >
    The strongest single-session evidence yet for the hardened-prompt + tri-model-sweep discipline
    on this line: Fable derived a 341-line timed-WySE result confirming all four hypotheses in ~13
    minutes, and a genuinely independent three-model blind sweep returned 6/8 unanimous SOUND with
    only two statement-level repairs, both caught pre-acceptance and both Opus-errata-scale. The
    external review legs ran on their own subscriptions, keeping the adversarial scrutiny off the
    Claude weekly limit. Net: AI strong on speed, structural correctness, and self-adversarial
    verification; the residual defects were precision-of-statement (an over-claimed iff; an
    over-scoped behavioral witness), exactly the class a tri-model sweep is built to catch. The
    R016 candidate-fencing held throughout (every result tagged CANDIDATE; obstructions reported as
    results, not smoothed). The one process blemish was external (machine restart truncating
    session close), not an agent or workflow failure.
