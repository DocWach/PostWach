    Cross-store invisibility with the SysMLv2 hive: no shared memory across stores, hive could not read the
    live main.tex, coordination ran through the principal as courier. Documented in the coordination retro.
  perception_note: >
    Substantially faster than manual for the build/verify loop. The decisive win was render-and-look:
    inspecting rendered pages (not the log) caught the author-line and listing overflows that a log-only
    pass reported as a single innocuous Overfull.
