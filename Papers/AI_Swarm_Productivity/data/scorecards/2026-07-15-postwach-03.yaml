# --- D4: PROCESS HEALTH (required) ---
process:
  agent_failures: 0
  retries: 3                    # latexmk force-rebuild; a few "read file before edit" retries
  rework_files: 2               # main.tex, refcheck.py (edited 3+ times)
  blocked_minutes: 10
