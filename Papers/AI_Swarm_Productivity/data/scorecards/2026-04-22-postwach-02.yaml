  perception_note: >
    Investigation work (finding the npx root cause, the gitignore trap,
    the batch1 stray commit) was where AI leverage mattered most; grep +
    cross-file correlation across 12 configs in seconds vs hours manually.
    The discrete fix-commit-push per hive was rote but benefited from
    uniform pattern application without drift. User's "discuss before
    executing" discipline caught two would-be mistakes (auto-commit risk;
    folder-move scope creep). Portability principle capture emerged
    organically from user's observation about multi-machine and
    collaboration — strong memory entry even though it creates a deferred
    planning debt rather than closing one.

