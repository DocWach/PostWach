    by paywall, 403, or expired TLS; subagents fell back to local pdftotext extraction and search metadata.
  perception_note: >
    The two research fan-outs (3 + 4 parallel subagents) were the biggest multiplier: located the full
    Beling/SERC SCRE lineage and confirmed WRT-1043 in minutes, work that would take hours manually. The SE
    artifact-chain discipline (needs -> objectives -> scope -> ConOps -> measures -> WBS/V&V/risk/exit) kept
    Year-1 planning coherent and traceable. Main friction was over-eager first drafts (cyber-only Red team,
    committing to MBCRA) that the principal corrected; the three-tier internal/external/slides framing then
    resolved the over-constraint cleanly.
